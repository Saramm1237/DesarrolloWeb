<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campos formulario</title>
</head>
<body>
    <!-- Campos formulario -->
     <form action="procesar.php" method="POST">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre"
        placeholder="Ingrese su nombre">
        <br>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
        placeholder="Ingrese la contraseña">
        <br>
        <label for="email">Correo</label>
        <input type="email" id="email" name="email"
        placeholder="Ingrese su correo">
        <br>
        <label for="cantidad">Cantidad</label>
        <input type="number" id="cantidad" name="cantidad"
        placeholder="Ingrese la cantidad">
        <br>
        <label for="date">Fecha de nacimiento</label>
        <input type="date" id="date" name="date"
        placeholder="Ingrese la fecha de nacimiento">
        <br>
        <label for="Mayoredad">¿Eres Mayor de edad?></label>
        <input type="radio" id="Si" name="edad"
        value="si">
        <label for="Si">Si</label> 
        <input type="radio" id="No" name="edad"
        value="no">
        <label for="no">No</label> 
        <br>
        <label for="">Selecciona tus intereses</label>
        <input type="checkbox" id="sport"
        name="interests" value="sport">
        <label for="sport">Deporte</label>
        <input type="checkbox" id="music"
        name="interests" value="music">
        <label for="music">Música</label>
        <input type="checkbox" id="travels"
        name="interests" value="travels">
        <label for="travels">Música</label>

        <br>
        <label for="comments">Comentarios: </label>
        <textarea name="comments" id="comments"
        cols="30" rows="10"></textarea>
        <br>
        <label for="country">País: </label>
        <select name="country" id="country">
            <option value="">Selecciona un país</option>
            <option value="canada">Canada</option>
            <option value="mexico">Mexico</option>
            <option value="argentina">Argentina</option>
            <option value="colombia">Colombia</option>
        </select>

        <br>
        <label for="country">País: </label>
        <select name="country" id="country" multiple>
            <option value="">Selecciona un país</option>
            <option value="canada">Canada</option>
            <option value="mexico">Mexico</option>
            <option value="argentina">Argentina</option>
            <option value="colombia">Colombia</option>
        </select>

        <br>
        <label for="file">Cargar archivo</label>
        <input type="file" id="file" name="file" multiple>
        <br>
        <label for="color">Color favorito</label>
        <input type="Color" id="color" name="color">
        <br>
        <label for="website">Sitio web: </label>
        <input type="url" id="website" name="website"
        placeholder="Ingrese el sitio web">
        <br>
        <label for="range">Puntuación: </label>
        <input type="range" id="range" name="range"
        min="0" max="10">
        <br>
        <input type="hidden" id="secret-id"
        name="secret-id" value="1234">
        <input type="submit" value="send">
        <input type="reset" value="reset">

     </form>
</body>
</html>
