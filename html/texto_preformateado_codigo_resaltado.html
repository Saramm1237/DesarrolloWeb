<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto preformateado, codigo y resaltado</title>
</head>
<body>
    <!-- Texto preformateado -->
     Esto 
     es
     Texto
     en varios 
     renglones

    <pre>
        Esto 
        es
        Texto
        en varios 
        renglones
    </pre>

    <!-- Codigo -->
     <p>Para imprimir "Hola mundo" en el lenguaje de 
        programación Python</p>
     <code>
        print("Hola mundo")
     </code>
     <p>Este codigo muestra el mensaje "Hola mundo" en la consola</p>

    <!-- Resaltado -->
     <p>Esto es un <mark>texto resaltado</mark></p>
</body>
</html>
