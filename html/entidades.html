<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entidades</title>
</head>
<body>
    <!-- Entidades: HTML comienzan con el caracter &(ampersand) y terminan con ;(punto y coma).
     Aquí hay algunas entidades HTML comunes: -->
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. &nbsp;&nbsp;&nbsp;Obcaecati.</p>
    &lt;p&gt;Esto es un parrafo&lt;/p&gt;
    &amp;
    &copy;
    &trade;
    &quot;
    &reg;
    &apos;
    
</body>
</html>
