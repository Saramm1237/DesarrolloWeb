<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe, canvas y time</title>
</head>
<body>
    <!-- Iframe -->
     <h2>Contenido embedido con iframe</h2>
     <iframe src="https://www.w3schools.com" style="height:200px;width:300px;" 
     title="Iframe Example"></iframe>

     <!-- Canvas -->
     <h2>Contenido en canvas</h2>
     <canvas id="myCanvas" width="200" height="100" style="border:3px solid black;">
        Tu navegador no soporta el elemento canvas.
     </canvas>

     <!-- Time -->
     <h2>Contenido en time</h2>
     <p>El reloj digital es: <time datetime="2026-01-21T10:00:00">
        18 de abril de 2022, 10:00:00</time></p>

    <p>El concierto durara: <time datetime="PT2H30M">2 horas y 30 minutos</time> </p>

    
</body>
</html>
