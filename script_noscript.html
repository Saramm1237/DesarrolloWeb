<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script y noScript</title>
</head>
<body>
    <!-- Script y noScript -->
     <h2>Ejemplo de Script</h2>
     <script src="script.js"></script>

     <script>
        alert("Hola");
        console.log("Esto es un mensaje de consola");
     </script>

     <!-- NoScript -->
      <noscript>
        <p>El navegador no soporta JavaScript. Algunas funcionalidades 
            pueden estar deshabilitadas.</p>
      </noscript>
    
</body>
</html>
